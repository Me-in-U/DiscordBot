name: bot

services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEPS_IMAGE: ${DEPS_IMAGE:-bot-discord-bot-deps:latest}
    container_name: discord-bot-shin
    restart: unless-stopped
    mem_limit: 500m
    env_file:
      - .env
    environment:
      - API_PORT=1557
    ports:
      - "127.0.0.1:1557:1557"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Host: host.docker.internal", "http://127.0.0.1:1557/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - bot.display_name=discord bot 神
